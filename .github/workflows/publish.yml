name: Publish to npm + Deploy to n8n

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Publish to npm
        run: npm publish --access public || echo "Version already published, skipping"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Deploy to n8n.pigeonfi.com
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.N8N_SERVER_IP }}
          username: root
          password: ${{ secrets.N8N_SERVER_PASSWORD }}
          script: |
            docker exec -u root n8n sh -c "npm cache clean --force && cd /home/node/.n8n/nodes && npm install n8n-nodes-kie-pro@${{ steps.version.outputs.VERSION }}"
            docker restart n8n
            sleep 10
            docker ps | grep n8n
            echo "Deployed n8n-nodes-kie-pro@${{ steps.version.outputs.VERSION }} successfully"
