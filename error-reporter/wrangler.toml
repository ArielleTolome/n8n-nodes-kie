name = "kie-error-reporter"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV namespace for deduplication (create with: wrangler kv:namespace create "KIE_ERRORS")
# After creating, replace the id below with your actual namespace ID
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[vars]
GITHUB_REPO = "ArielleTolome/n8n-nodes-kie"

# Secrets (set via: wrangler secret put GITHUB_TOKEN / SECRET_KEY)
# GITHUB_TOKEN = set via wrangler secret
# SECRET_KEY   = set via wrangler secret
