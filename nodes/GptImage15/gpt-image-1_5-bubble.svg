<?xml version="1.0" encoding="UTF-8"?>
<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="clay3D" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.3" result="blur"/>
      <feSpecularLighting in="blur" surfaceScale="5" specularConstant="1.2" specularExponent="15" lighting-color="#ffffff" result="spec">
        <fePointLight x="-10" y="-10" z="25"/>
      </feSpecularLighting>
      <feComposite in="spec" in2="SourceAlpha" operator="in" result="specIn"/>
      <feComposite in="SourceGraphic" in2="specIn" operator="arithmetic" k1="0" k2="1" k3="1" k4="0" result="litText"/>
      <feDropShadow in="litText" dx="1.5" dy="1.5" stdDeviation="1" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <circle cx="20" cy="20" r="20" fill="#FF69B4"/>

  <!-- Корона с 3 рожками -->
  <path d="M7,12 L7,6 L10,10 L13,2 L16,10 L19,6 L19,12 Z" fill="white" filter="url(#clay3D)" transform="rotate(-15, 13, 7) translate(-1, -1)"/>

  <!-- Текст: Супер-жирный, Идеальный центр (y=14.5 и 25.5 центрируют блок относительно 20) -->
  <g filter="url(#clay3D)" font-family="Gilroy, sans-serif" font-weight="900" fill="#FFFFFF" text-anchor="middle" style="stroke: #FFFFFF; stroke-width: 1.2px; paint-order: stroke fill;">
    <text x="20" y="14.5" font-size="11" dominant-baseline="middle">GPT</text>
    <text x="20" y="25.5" font-size="11" dominant-baseline="middle">1.5</text>
  </g>
</svg>